[pytest]
# -------------------------------------------------------
# pytest.ini — AdNabuTestStore QA Automation
# -------------------------------------------------------

# Default test discovery path
testpaths = tests

# Naming conventions pytest uses to discover tests
python_files  = test_*.py
python_classes = Test*
python_functions = test_*

# Default flags applied on every run:
#   -v         → verbose output (show each test name)
#   -s         → show print() statements in terminal
#   --tb=short → show short traceback on failure
addopts = -v -s --tb=short

# Custom markers (optional — for future filtering)
markers =
    smoke: Quick sanity check tests
    regression: Full regression suite
    positive: Positive path tests
    negative: Negative path tests
    edge: Edge case tests
